<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF3D00"/>
    </linearGradient>
    <linearGradient id="flash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Camera viewfinder corners -->
  <path d="M140 170 L140 140 Q140 120 160 120 L190 120" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M322 120 L352 120 Q372 120 372 140 L372 170" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M372 342 L372 372 Q372 392 352 392 L322 392" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M190 392 L160 392 Q140 392 140 372 L140 342" stroke="white" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Lightning bolt (the "hot shot") -->
  <path d="M280 150 L230 265 L275 265 L232 370 L310 240 L265 240 Z" fill="url(#flash)" stroke="white" stroke-width="6" stroke-linejoin="round"/>
  <!-- Terminal cursor line at bottom -->
  <rect x="140" y="420" width="40" height="6" rx="3" fill="white" opacity="0.9"/>
  <rect x="190" y="420" width="180" height="6" rx="3" fill="white" opacity="0.5"/>
</svg>
